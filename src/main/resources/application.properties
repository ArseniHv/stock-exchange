# Port is injected at runtime via env variable (Docker), defaults to 8080 locally
server.port=${PORT:8080}

# Redis connection — hostname matches Docker Compose service name
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Disable Spring Boot Redis repositories (we use RedisTemplate directly)
spring.data.redis.repositories.enabled=false
